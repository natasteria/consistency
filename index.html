<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>CONSISTENCY</title>
</head>
<body>
    <div id="date-container">
        <div id="date">
            <span id="month"></span> 
            <span id="day"></span> 
            <span id="year"></span>
        </div>
        <div id="current-time"></div>
    </div>

    <div id="timer-container">
        <div id="timer">00:00:00</div>

        <div id="btns">
            <button id="start-stop-btn" data-timer-started="false">Start/Stop</button>
            <button id="reset">Reset</button>
        </div>
    </div>

    <div id="sessions"></div>

    <div class="hidden">

        <div id="topic-overlay" class="overlay">
            <div class="form-container">
                <h3>Add Topic</h3>
                
                <label for="topic-input">Topic: </label>
                <div>
                    <input type="text" id="topic-input" placeholder="Topic Name">
                </div>

                <label for="summary-input">Short Summary: </label>
                <div>
                    <textarea id="summary-input" placeholder="Short summary"></textarea>
                </div>

                <div>
                    <button id="save-topic-btn">Save</button>
                    <button id="close-overlay-btn">Cancel</button>
                </div>
                <p id="user-message" class="message hidden"></p>
            </div>
        </div>
    </div>


</body>
</html>
